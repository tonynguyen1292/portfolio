<!DOCTYPE html>
<html lang="en-AU" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Message sent — Vy Nguyen</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    (function () {
      document.documentElement.classList.add('js');
      try {
        var saved = localStorage.getItem('vn-theme');
        var dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) { /* default stays light */ }
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="standalone">
    <div class="standalone-card">
      <p class="eyebrow">Message sent</p>
      <h1 class="standalone-title">Thanks — it's in my inbox.</h1>
      <p class="standalone-text">I read everything personally and reply within one business day. If it's urgent, <a href="mailto:tonynguyen1996.jb@gmail.com">email me directly</a> or find me on <a href="https://www.linkedin.com/in/vynguyen1996/" rel="noopener">LinkedIn</a>.</p>
      <a class="btn btn-primary" href="/">Back to the portfolio</a>
    </div>
  </main>
</body>
</html>
